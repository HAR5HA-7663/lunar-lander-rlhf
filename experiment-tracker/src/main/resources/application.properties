# SQLite database — shared with Python notebooks
# Path is relative to where you run the Spring Boot app (experiment-tracker/ dir)
spring.datasource.url=jdbc:sqlite:../../experiments.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate / JPA settings for SQLite
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Server port
server.port=8080

# App name
spring.application.name=experiment-tracker
